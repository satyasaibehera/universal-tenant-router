name: API Integration Tests

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build TypeScript Project
        run: |
          npm ci
          npm run build

      - name: Install Hurl
        run: |
          curl -LO https://github.com/Orange-OpenSource/hurl/releases/download/4.2.0/hurl_4.2.0_amd64.deb
          sudo dpkg -i hurl_4.2.0_amd64.deb

      - name: Execute HTTP Endpoints Test
        run: hurl --test test_cases/test.http

      - name: Deploy to Netlify
        if: success()
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B | tr '/' '-')
          npx netlify-cli deploy --prod --dir=dist --functions=netlify/functions --site ${{ secrets.NETLIFY_SITE_ID }} --auth ${{ secrets.NETLIFY_AUTH_TOKEN }} --message "$COMMIT_MSG"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}