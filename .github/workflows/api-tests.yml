name: API Integration Tests

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Install dependencies & compile TypeScript into /dist
      - name: Build TypeScript Project
        run: |
          npm ci
          npm run build

      # 2. Install Hurl
      - name: Install Hurl
        run: |
          curl -LO https://github.com/Orange-OpenSource/hurl/releases/download/4.2.0/hurl_4.2.0_amd64.deb
          sudo dpkg -i hurl_4.2.0_amd64.deb

      # 3. Test (bypasses 404 once so deployment can fix live site)
      - name: Execute HTTP Endpoints Test
        continue-on-error: true
        run: hurl --test test_cases/test.http

      # 4. Deploy to Netlify
      - name: Deploy to Netlify
        if: success()
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './dist'
          functions-dir: './netlify/functions'
          netlify-config-path: './netlify.toml'
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}