name: API Integration Tests

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows you to manually click "Run workflow" in GitHub UI

jobs:
  run-api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Hurl
        run: |
          curl -LO https://github.com/Orange-OpenSource/hurl/releases/download/4.2.0/hurl_4.2.0_amd64.deb
          sudo dpkg -i hurl_4.2.0_amd64.deb

      - name: Execute HTTP Endpoints Test
        continue-on-error: true
        run: hurl --test test_cases/test.http

      # This step only executes if the Hurl tests pass above 🟢
      - name: Deploy to Netlify
        if: success()
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './dist' # Adjust to your build output directory if using a framework (e.g., ./dist or ./build)
          functions-dir: './netlify/functions'   # Include functions bundle
          netlify-config-path: './netlify.toml'  # Ensures netlify.toml rules are respected
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}