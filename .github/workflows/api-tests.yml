name: API Integration Tests

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build TypeScript Project
        run: |
          npm ci
          npm run build

      - name: Install Hurl
        run: |
          curl -LO https://github.com/Orange-OpenSource/hurl/releases/download/4.2.0/hurl_4.2.0_amd64.deb
          sudo dpkg -i hurl_4.2.0_amd64.deb

      - name: Execute HTTP Endpoints Test
        continue-on-error: true   # <--- KEPT TEMPORARILY FOR THIS PUSH
        run: hurl --test test_cases/test.http

      - name: Deploy to Netlify
        if: success()
        run: |
          npx netlify-cli deploy --prod --dir=dist --functions=netlify/functions
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}